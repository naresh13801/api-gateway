# ===============================
# SERVER CONFIG
# ===============================
server.port=8080
spring.application.name=api-gateway

# ===============================
# GATEWAY ROUTES
# ===============================

# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# User Service
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/user/**

# Catalog Service
spring.cloud.gateway.routes[2].id=catalog-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/services/**

# Booking Service
spring.cloud.gateway.routes[3].id=booking-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/booking/**

# ===============================
# LOGGING (DEBUG for gateway)
# ===============================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG


#JWT Configuration
jwt.secret=my-super-secret-key-my-super-secret-key
# Must be at least 256 bits (32 characters for HS256)
jwt.expiration=3600000 
# 1 hour in milliseconds